# Not a real workspace — this file is pnpm 11's settings home.

# pnpm 11 blocks dependency build scripts by default. Allow the ones we need:
#  - electron: downloads its runtime binary
#  - esbuild:  installs its prebuilt binary
#  - better-sqlite3: DISABLED — its default install compiles for Node v24 (no
#    prebuild → needs MSVC). We instead download the Electron prebuilt binary in
#    the root `postinstall` (scripts/rebuild-native.mjs). No compiler required.
allowBuilds:
  electron: true
  esbuild: true
  better-sqlite3: false
  # node-pty: DISABLED — 동봉 prebuilt(prebuilds/win32-x64/*.node, N-API)가 Node·Electron
  # 양쪽에서 그대로 로드된다(M2 Task 1 스파이크 확인). node-gyp 컴파일 불필요(MSVC 불필요).
  node-pty: false
minimumReleaseAgeExclude:
  - '@anthropic-ai/claude-agent-sdk-darwin-arm64@0.3.158'
  - '@anthropic-ai/claude-agent-sdk-darwin-x64@0.3.158'
  - '@anthropic-ai/claude-agent-sdk-linux-arm64-musl@0.3.158'
  - '@anthropic-ai/claude-agent-sdk-linux-arm64@0.3.158'
  - '@anthropic-ai/claude-agent-sdk-linux-x64-musl@0.3.158'
  - '@anthropic-ai/claude-agent-sdk-linux-x64@0.3.158'
  - '@anthropic-ai/claude-agent-sdk-win32-arm64@0.3.158'
  - '@anthropic-ai/claude-agent-sdk-win32-x64@0.3.158'
  - '@anthropic-ai/claude-agent-sdk@0.3.158'
